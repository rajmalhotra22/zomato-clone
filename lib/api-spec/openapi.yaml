openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Zomato Clone API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: restaurants
    description: Restaurant operations
  - name: menu
    description: Menu item operations
  - name: orders
    description: Order operations
  - name: cart
    description: Cart operations
  - name: categories
    description: Cuisine category operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /restaurants:
    get:
      operationId: listRestaurants
      tags: [restaurants]
      summary: List all restaurants
      parameters:
        - name: cuisine
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [rating, delivery_time, cost]
        - name: vegetarian
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Restaurant"

  /restaurants/featured:
    get:
      operationId: getFeaturedRestaurants
      tags: [restaurants]
      summary: Get featured restaurants
      responses:
        "200":
          description: Featured restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Restaurant"

  /restaurants/stats:
    get:
      operationId: getRestaurantStats
      tags: [restaurants]
      summary: Get overall stats (restaurant count, cuisine count, avg delivery time)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /restaurants/{id}:
    get:
      operationId: getRestaurant
      tags: [restaurants]
      summary: Get a restaurant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restaurant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"
        "404":
          description: Not found

  /restaurants/{id}/menu:
    get:
      operationId: getRestaurantMenu
      tags: [menu]
      summary: Get menu items for a restaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Menu items grouped by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuCategory"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all cuisine categories
      responses:
        "200":
          description: Cuisine categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CuisineCategory"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/recent:
    get:
      operationId: getRecentOrders
      tags: [orders]
      summary: Get recent orders
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Restaurant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        cuisine:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        deliveryTime:
          type: integer
        deliveryFee:
          type: number
        minimumOrder:
          type: number
        imageUrl:
          type: string
        isVeg:
          type: boolean
        isOpen:
          type: boolean
        discount:
          type: string
        address:
          type: string
        priceForTwo:
          type: number
        isFeatured:
          type: boolean
      required:
        - id
        - name
        - cuisine
        - rating
        - reviewCount
        - deliveryTime
        - deliveryFee
        - minimumOrder
        - imageUrl
        - isVeg
        - isOpen
        - address
        - priceForTwo
        - isFeatured

    MenuItem:
      type: object
      properties:
        id:
          type: integer
        restaurantId:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
        isVeg:
          type: boolean
        isPopular:
          type: boolean
        isAvailable:
          type: boolean
        spiceLevel:
          type: string
          enum: [mild, medium, hot, extra_hot]
      required:
        - id
        - restaurantId
        - name
        - description
        - price
        - category
        - imageUrl
        - isVeg
        - isPopular
        - isAvailable

    MenuCategory:
      type: object
      properties:
        category:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"
      required:
        - category
        - items

    CuisineCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        imageUrl:
          type: string
        restaurantCount:
          type: integer
      required:
        - id
        - name
        - imageUrl
        - restaurantCount

    Order:
      type: object
      properties:
        id:
          type: integer
        restaurantId:
          type: integer
        restaurantName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalAmount:
          type: number
        deliveryFee:
          type: number
        grandTotal:
          type: number
        status:
          type: string
          enum: [pending, confirmed, preparing, out_for_delivery, delivered, cancelled]
        deliveryAddress:
          type: string
        createdAt:
          type: string
        estimatedDelivery:
          type: string
      required:
        - id
        - restaurantId
        - restaurantName
        - items
        - totalAmount
        - deliveryFee
        - grandTotal
        - status
        - deliveryAddress
        - createdAt
        - estimatedDelivery

    OrderItem:
      type: object
      properties:
        menuItemId:
          type: integer
        name:
          type: string
        quantity:
          type: integer
        price:
          type: number
      required:
        - menuItemId
        - name
        - quantity
        - price

    CreateOrderBody:
      type: object
      properties:
        restaurantId:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              menuItemId:
                type: integer
              quantity:
                type: integer
            required:
              - menuItemId
              - quantity
        deliveryAddress:
          type: string
      required:
        - restaurantId
        - items
        - deliveryAddress

    PlatformStats:
      type: object
      properties:
        totalRestaurants:
          type: integer
        totalCuisines:
          type: integer
        avgDeliveryTime:
          type: integer
        totalOrders:
          type: integer
      required:
        - totalRestaurants
        - totalCuisines
        - avgDeliveryTime
        - totalOrders
